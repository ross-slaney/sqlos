<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SqlOSFga Dashboard</title>
    <script>window.__SQL_OS_BASE_PATH__ = "__SQL_OS_BASE_PATH__";</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">Sz</div>
                <span class="sidebar-title">SqlOSFga</span>
                <button class="sidebar-close" id="sidebar-close">&times;</button>
            </div>
            <nav>
                <div class="nav-group">
                    <div class="nav-label">Authorization</div>
                    <a href="#/resources" data-view="resources" class="active">Resources</a>
                    <a href="#/grants" data-view="grants">Grants</a>
                    <a href="#/roles" data-view="roles">Roles</a>
                    <a href="#/permissions" data-view="permissions">Permissions</a>
                </div>
                <div class="nav-group">
                    <div class="nav-label">Subjects</div>
                    <a href="#/users" data-view="users">Users</a>
                    <a href="#/agents" data-view="agents">Agents</a>
                    <a href="#/service-accounts" data-view="service-accounts">Service Accounts</a>
                    <a href="#/user-groups" data-view="user-groups">User Groups</a>
                </div>
                <div class="nav-group">
                    <div class="nav-label">Tools</div>
                    <a href="#/access-tester" data-view="access-tester">Access Tester</a>
                </div>
            </nav>
        </aside>
        <div class="main-wrapper">
            <div class="topbar" id="topbar">
                <button class="hamburger" id="hamburger">&#9776;</button>
                <span class="topbar-title">SqlOSFga</span>
            </div>
            <main>
                <div id="stats" class="stats-bar"></div>
                <div id="content"></div>
            </main>
        </div>
    </div>
    <div id="modal-overlay" class="modal-overlay" style="display:none">
        <div id="modal" class="modal"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
