name: Publish to NuGet

on:
  release:
    types: [published]

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - run: chmod +x scripts/*.sh && ./scripts/check-release-checklist.sh
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
      - run: docker pull mcr.microsoft.com/mssql/server:2022-latest
        continue-on-error: true
      - run: chmod +x scripts/*.sh && ./scripts/build.sh
      - run: chmod +x scripts/*.sh && ./scripts/unit-tests.sh
      - run: chmod +x scripts/*.sh && ./scripts/integration-tests.sh
        env:
          ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
        timeout-minutes: 20
      - run: chmod +x scripts/*.sh && ./scripts/docs-check.sh
      - run: dotnet pack src/SqlOS/SqlOS.csproj -c Release -o ./nupkg
      - run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
